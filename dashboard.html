<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLDGuard Quant Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <header class="border-b border-slate-700 pb-4">
            <h1 class="text-2xl font-bold">WLDGuard Quant Console</h1>
            <p class="text-slate-400">Live Gemini Agent Sandbox</p>
        </header>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Input Card -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                
                <div class="mb-4 p-3 bg-slate-900/50 rounded border border-blue-500/30">
                    <label class="block text-sm font-semibold text-blue-400 mb-2">1. Paste Gemini API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full bg-black p-2 rounded border border-slate-600 text-sm font-mono focus:border-blue-500 focus:outline-none">
                    <p class="text-xs text-slate-500 mt-1">Your key stays local in your browser. It is never sent to our servers.</p>
                </div>

                <h2 class="font-semibold mb-2 text-slate-200">2. Input State (JSON)</h2>
                <textarea id="stateInput" class="w-full h-40 bg-black p-3 rounded border border-slate-600 text-sm font-mono mb-4 focus:border-blue-500 focus:outline-none">
{
  "userAddress": "0xMockUser123",
  "marketData": {"currentWldPrice": 2.10, "trend": "stable"},
  "userState": {"wldBalance": 100, "usdcBalance": 0, "morphoWldReceipts": 0}
}</textarea>
                <button onclick="runAgent()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition shadow-lg shadow-blue-600/20 active:scale-[0.98]">
                    Wake Up Agent & Analyze
                </button>
            </div>

            <!-- Output Card -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col">
                <h2 class="font-semibold mb-4 text-slate-200">Agent Decision</h2>
                <div id="outputArea" class="flex-grow overflow-y-auto bg-black p-4 rounded border border-slate-600 text-emerald-400 font-mono text-sm whitespace-pre-wrap leading-relaxed shadow-inner">
Waiting for input...
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runAgent() {
            const outputArea = document.getElementById('outputArea');
            const input = document.getElementById('stateInput').value;
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            
            if (!apiKey) {
                outputArea.innerHTML = '<span class="text-red-400">Error: Please paste your Gemini API key first!</span>';
                return;
            }

            outputArea.innerHTML = '<span class="text-blue-400 animate-pulse">Agent is thinking...</span>';
            
            try {
                // 1. Parse the JSON to ensure it's valid before sending
                const data = JSON.parse(input);
                
                // 2. Construct the strict prompt for the Quant AI
                const prompt = `
You are the WLDguard Quant AI. Analyze this user state and market data.
Market Data: ${JSON.stringify(data.marketData)}
User State: ${JSON.stringify(data.userState)}

Rule 1: If wldBalance > 0 and morphoWldReceipts == 0, output "Deposit to Morpho".
Rule 2: If morphoWldReceipts > 0, output "Hold and monitor".

What is your decision? Reply ONLY with your decision and a brief 1-sentence reasoning based on the rules.
                `;

                // 3. Connect directly to the Gemini API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            temperature: 0, // Zero temperature for strict, robotic rule-following
                        }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "API Request Failed");
                }

                // 4. Extract and display the AI's actual thought process
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                
                outputArea.innerText = aiText;

            } catch (e) {
                outputArea.innerHTML = `<span class="text-red-400">Error: ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
